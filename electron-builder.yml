appId: com.curevoicer.desktop
productName: Cure Voicer
asar: true
# All native runtime dependencies ship N-API/prebuilt Windows x64 binaries.
# Rebuilding them is unnecessary and currently breaks on the Windows 2026
# runner because uiohook's node-gyp cannot detect Visual Studio 18 yet.
npmRebuild: false

directories:
  output: release

files:
  - out/**/*
  - assets/branding/**/*
  - README.md
  - PRIVACY.md
  - THIRD_PARTY_NOTICES.md
  - package.json

asarUnpack:
  - node_modules/**/*.node
  - node_modules/sherpa-onnx-*/**/*
  - node_modules/uiohook-napi/**/*
  - node_modules/node-llama-cpp/**/*

win:
  icon: assets/branding/cure-voicer.ico
  verifyUpdateCodeSignature: true
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64
  requestedExecutionLevel: asInvoker

nsis:
  artifactName: Cure-Voicer-${version}-windows-${arch}-setup.${ext}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Cure Voicer
  uninstallDisplayName: Cure Voicer
  deleteAppDataOnUninstall: false

portable:
  artifactName: Cure-Voicer-${version}-windows-${arch}-portable.${ext}

mac:
  category: public.app-category.productivity
  icon: assets/branding/cure-voicer.icns
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: Cure Voicer uses the microphone only while you dictate.
    NSAppleEventsUsageDescription: Cure Voicer uses System Events to paste text when direct input is unavailable.
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  artifactName: Cure-Voicer-${version}-macos-${arch}.${ext}
  extraResources:
    - from: native/macos-asr/.build/release/cure-voicer-asr
      to: bin/cure-voicer-asr
    - from: native/macos-asr/.build/release/cure-voicer-input
      to: bin/cure-voicer-input

publish:
  provider: github
  owner: webobscure
  repo: cure-voicer
  releaseType: release
